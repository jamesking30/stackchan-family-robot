<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小栈 · 家庭机器人</title>
  <style>
    :root { color-scheme: light; --ink:#17302b; --muted:#65736f; --paper:#fffdf7; --line:#dce6df; --mint:#ccebdc; --green:#176b52; --peach:#ffcfac; --danger:#a13d32; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:linear-gradient(145deg,#edf8f2 0%,#fff8ed 55%,#f4efe5 100%); color:var(--ink); font:16px/1.55 ui-rounded,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { max-width:1120px; margin:auto; padding:32px 20px 64px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:24px; }
    h1 { margin:0; font-size:clamp(28px,5vw,48px); letter-spacing:-.04em; }
    h1 span { color:var(--green); }
    .eyebrow { color:var(--green); font-weight:700; letter-spacing:.08em; text-transform:uppercase; font-size:12px; }
    .status { display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 12px; box-shadow:0 10px 35px #315f4a12; }
    .dot { width:10px; height:10px; border-radius:50%; background:#33b982; box-shadow:0 0 0 5px #33b98220; }
    .grid { display:grid; grid-template-columns:1.4fr 1fr; gap:18px; }
    .card { background:#ffffffd9; border:1px solid var(--line); border-radius:24px; padding:22px; box-shadow:0 18px 50px #315f4a12; backdrop-filter:blur(12px); }
    .card h2 { margin:0 0 4px; font-size:20px; }
    .sub { color:var(--muted); margin:0 0 18px; font-size:14px; }
    .face { width:128px; height:96px; margin:8px auto 16px; border-radius:34px; background:var(--ink); position:relative; box-shadow:inset 0 -8px 0 #0002,0 12px 25px #17302b25; }
    .eye { position:absolute; top:36px; width:12px; height:17px; background:var(--mint); border-radius:50%; }
    .eye.left { left:35px; } .eye.right { right:35px; }
    .mouth { position:absolute; left:52px; top:62px; width:24px; height:10px; border-bottom:3px solid var(--peach); border-radius:50%; }
    .task-title { text-align:center; font-size:20px; font-weight:750; }
    .task-sub { text-align:center; color:var(--muted); min-height:24px; }
    .bar { height:8px; overflow:hidden; border-radius:99px; background:#e7eee9; margin-top:16px; }
    .bar > div { height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,var(--green),#54bd8e); transition:width .3s; }
    label { display:block; font-weight:700; font-size:14px; margin:14px 0 6px; }
    textarea,input,select { width:100%; border:1px solid #cbd9d0; background:var(--paper); color:var(--ink); border-radius:13px; padding:11px 13px; font:inherit; }
    textarea { min-height:150px; resize:vertical; }
    button { border:0; border-radius:13px; padding:11px 16px; font:700 14px inherit; cursor:pointer; background:var(--green); color:#fff; }
    button.secondary { background:#edf4f0; color:var(--green); }
    button:disabled { opacity:.5; cursor:wait; }
    .actions { display:flex; gap:10px; margin-top:12px; }
    .version { margin-top:10px; color:var(--muted); font:12px ui-monospace,SFMono-Regular,Menlo,monospace; overflow-wrap:anywhere; }
    .people { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .person { border:1px solid var(--line); border-radius:16px; padding:13px; background:var(--paper); }
    .person strong { display:block; }
    .role { color:var(--muted); font-size:13px; }
    .message { min-height:24px; color:var(--green); font-size:14px; margin-top:8px; }
    .key-row { display:flex; gap:8px; } .key-row input { flex:1; }
    @media (max-width:760px) { .grid { grid-template-columns:1fr; } header { align-items:flex-start; flex-direction:column; } }
  </style>
</head>
<body>
<main>
  <header>
    <div><div class="eyebrow">Local-first family robot</div><h1>小栈 <span>Stack-chan</span></h1></div>
    <div class="status"><span class="dot"></span><span id="health">正在连接本地服务…</span></div>
  </header>

  <div class="grid">
    <section class="card">
      <h2>机器人现在显示</h2><p class="sub">Codex 与 OpenClaw 的任务状态会汇总到这里，随后同步到真机表情。</p>
      <div class="face"><i class="eye left"></i><i class="eye right"></i><i class="mouth"></i></div>
      <div id="taskTitle" class="task-title">小栈已就绪</div>
      <div id="taskSub" class="task-sub">Stack-chan is ready</div>
      <div class="bar"><div id="taskProgress"></div></div>
    </section>

    <section class="card">
      <h2>家庭成员</h2><p class="sub">四个槽位已隔离；真机人脸登记后再绑定身份。</p>
      <div id="people" class="people"></div>
    </section>

    <section class="card">
      <h2>回答方式</h2><p class="sub">保存后下一轮对话立即生效，并可一键回退。</p>
      <label for="style">给小栈的回答要求</label>
      <textarea id="style"></textarea>
      <label for="reason">修改原因</label>
      <input id="reason" value="通过本地管理页调整回答方式">
      <div class="actions"><button id="saveStyle">保存为新版本</button><button id="rollback" class="secondary">回退上个版本</button></div>
      <div id="version" class="version"></div><div id="message" class="message"></div>
    </section>

    <section class="card">
      <h2>本机管理密钥</h2><p class="sub">开发时可留空；对局域网开放前必须设置。</p>
      <div class="key-row"><input id="adminKey" type="password" placeholder="ROBOT_ADMIN_API_KEY"><button class="secondary" id="saveKey">保存在当前浏览器</button></div>
      <p class="sub" style="margin-top:14px">密钥只保存在浏览器本地，不会写进角色或记忆数据库。</p>
    </section>
  </div>
</main>
<script>
  const $ = id => document.getElementById(id);
  const roleNames = {adult:'成人',child:'儿童',unassigned:'待分配',guest:'访客'};
  let activeCharacter = null;
  const headers = () => { const key=localStorage.getItem('robotAdminKey'); return {'Content-Type':'application/json',...(key?{'X-Robot-Admin-Key':key}:{})}; };
  async function api(path, options={}) { const response=await fetch(path,{...options,headers:{...headers(),...(options.headers||{})}}); if(!response.ok){let msg=await response.text();throw new Error(msg)} return response.status===204?null:response.json(); }
  async function load() {
    try {
      await api('/health'); $('health').textContent='本地服务在线';
      const [character,users,state]=await Promise.all([api('/v1/characters/family-companion'),api('/v1/users'),api('/v1/display/state')]);
      activeCharacter=character; $('style').value=character.documents.response_instructions; $('version').textContent='当前版本 '+character.version;
      $('people').innerHTML=users.map(u=>`<div class="person"><strong>${escapeHtml(u.display_name)}</strong><span class="role">${roleNames[u.role]||u.role} · ${u.locale}${u.is_admin?' · 管理员':''}</span></div>`).join('');
      $('taskTitle').textContent=state.title; $('taskSub').textContent=state.subtitle; $('taskProgress').style.width=`${Math.round((state.progress||0)*100)}%`;
    } catch(error) { $('health').textContent='本地服务不可用'; $('message').textContent=error.message; }
  }
  $('saveStyle').onclick=async()=>{ try { $('saveStyle').disabled=true; const updated=await api('/v1/characters/family-companion/versions',{method:'POST',body:JSON.stringify({base_version:activeCharacter.version,patch:{response_instructions:$('style').value},reason:$('reason').value,actor:'admin-web',activate:true})}); activeCharacter=updated; $('version').textContent='当前版本 '+updated.version; $('message').textContent='已生效；下一轮对话将使用新方式。'; } catch(e){$('message').textContent=e.message} finally{$('saveStyle').disabled=false} };
  $('rollback').onclick=async()=>{ try { const updated=await api('/v1/characters/family-companion/rollback',{method:'POST',body:JSON.stringify({actor:'admin-web',reason:'通过管理页回退'})}); activeCharacter=updated; $('style').value=updated.documents.response_instructions; $('version').textContent='当前版本 '+updated.version; $('message').textContent='已回退。'; } catch(e){$('message').textContent=e.message} };
  $('saveKey').onclick=()=>{localStorage.setItem('robotAdminKey',$('adminKey').value);$('message').textContent='管理密钥已保存在当前浏览器。'};
  $('adminKey').value=localStorage.getItem('robotAdminKey')||'';
  function escapeHtml(v){const d=document.createElement('div');d.textContent=v;return d.innerHTML}
  load(); setInterval(async()=>{try{const s=await api('/v1/display/state');$('taskTitle').textContent=s.title;$('taskSub').textContent=s.subtitle;$('taskProgress').style.width=`${Math.round((s.progress||0)*100)}%`;}catch(_){}},5000);
</script>
</body>
</html>
